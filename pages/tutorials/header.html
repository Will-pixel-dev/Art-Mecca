<!-- Header HTML and CSS -->
<style>
  /* ========== HEADER STYLES ========== */
  .tutorial-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 0.8rem 0;
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
      Cantarell, sans-serif;
  }

  .tutorial-header .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 1.8rem;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  }

  .logo i {
    font-size: 2rem;
    filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.2));
  }

  .tutorial-header nav ul {
    display: flex;
    gap: 2rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .tutorial-header nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    padding: 0.5rem 1rem;
    border-radius: 50px;
    position: relative;
  }

  .tutorial-header nav ul li a:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
  }

  .tutorial-header nav ul li a::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: white;
    transition: width 0.3s ease;
  }

  .tutorial-header nav ul li a:hover::after {
    width: 80%;
  }

  /* Account Button Styles */
  .account-container {
    display: flex;
    align-items: center;
  }

  .account-button {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 2px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(5px);
  }

  .account-button i {
    font-size: 1.2rem;
  }

  .account-button:hover {
    background: white;
    color: #667eea;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    border-color: white;
  }

  /* Responsive Header Styles */
  @media (max-width: 768px) {
    .header-content {
      flex-direction: column;
      text-align: center;
    }

    .tutorial-header nav ul {
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
    }

    .tutorial-header nav ul li a {
      font-size: 1rem;
      padding: 0.4rem 0.8rem;
    }

    .account-button {
      padding: 0.5rem 1rem;
    }

    .account-button span {
      display: none;
    }

    .account-button i {
      font-size: 1.3rem;
      margin: 0;
    }
  }

  @media (max-width: 480px) {
    .tutorial-header nav ul {
      gap: 0.5rem;
    }

    .tutorial-header nav ul li a {
      font-size: 0.9rem;
      padding: 0.3rem 0.6rem;
    }

    .logo {
      font-size: 1.5rem;
    }

    .logo i {
      font-size: 1.7rem;
    }
  }
</style>

<!-- Header HTML -->
<header class="tutorial-header">
  <div class="container">

      <div class="logo">
        <i class="fas fa-palette"></i>

      </div>
      <nav>
        <ul>
          <li><a href="../../../index.html">Home</a></li>
          <li><a href="../tutorials.html">Tutorials</a></li>
          <li>
            <a href="../software-guides/software-comparison.html">Software</a>

          <li><a href="../../tools/tools.html">Tools</a></li>

      </div>
    </div>
  </div>
</header>

<!-- Footer HTML and CSS -->
<style>
  /* ========== FOOTER STYLES ========== */
  .tutorial-footer {
    background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);

    overflow: hidden;
    font-family:

  .tutorial-footer::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;

    height: 4px;

    margin: 0 auto;
    padding: 0 20px;

    gap: 2rem;
    margin-bottom: 2rem;

  .footer-section h3 {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #667eea, #f705d7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .footer-section h4 {
    font-size: 1.2rem;
    margin-bottom: 1rem;
    color: #a0aec0;
  }

  }

    padding: 0;
    margin: 0;
  }

  .footer-section ul li {
    margin-bottom: 0.5rem;
  }

  .footer-section ul li a {
    color: #cbd5e0;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    padding-left: 1.2rem;
    display: inline-block;
  }

  .footer-section ul li a::before {
    content: "→";
    position: absolute;
    left: 0;
    transition: transform 0.3s ease;
  }

  .footer-section ul li a:hover {
    color: white;
    padding-left: 1.5rem;
  }

  .footer-section ul li a:hover::before {
    transform: translateX(5px);
  }

  /* Social Links */
  .social-links {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    color: white;
    text-decoration: none;
    transition: all 0.3s ease;
    font-size: 1.2rem;
  }

  .social-link:hover {
    background: linear-gradient(135deg, #667eea, #f705d7);
    transform: translateY(-3px) scale(1.1);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
  }

  /* Footer Bottom */
  .footer-bottom {
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    color: #a0aec0;
  }

  .footer-bottom p {
    margin: 0;
    font-size: 0.9rem;
  }

  /* Responsive Footer Styles */
  @media (max-width: 768px) {
    .footer-content {
      grid-template-columns: 1fr;
      text-align: center;
    }

    .footer-section ul li a {
      display: inline-block;
    }

    .social-links {
      justify-content: center;
    }

    .footer-section h3,
    .footer-section h4 {
      text-align: center;
    }
  }

  @media (max-width: 480px) {
    .tutorial-footer {
      padding: 2rem 0 1rem 0;
    }

    .footer-section {
      margin-bottom: 1rem;
    }

    .social-link {
      width: 35px;
      height: 35px;
      font-size: 1rem;
    }
  }
</style>
